rental_agreement_rules:

  tenant_rules:
    description: >
      Rules to ensure the tenant's rights and obligations are clearly
      defined and protected within the rental agreement.
    required_clauses:
      - name: FIXED-TERM AGREEMENT
        description: >
          The agreement must specify a clear start date and end date
          for the rental period. Open-ended or undefined terms are
          not acceptable.

      - name: RENT PAYMENT PROCEDURE
        description: >
          The agreement must outline how, when, and where rent is to
          be paid, including due dates, grace periods, and late
          payment penalties.

      - name: FORM OF PAYMENT
        description: >
          Accepted payment methods must be explicitly stated such as
          personal check, cashier's check, or money order.
          The absence of electronic payment options alone is not a failure.

      - name: FULL DISCLOSURE
        description: >
          The agreement must contain a full disclosure statement confirming
          the tenant has read, understood, and agreed to all terms.
          A signed acknowledgement clause satisfies this requirement.

      - name: TERMINATION AND RENEWAL TERMS
        description: >
          The agreement must describe what happens at the end of the lease
          term, including automatic renewal or month-to-month continuation,
          and the notice period required to prevent automatic renewal.
          A formal early termination penalty clause is preferred but not
          strictly required for this check to pass.

      - name: TENANT RIGHTS AND RESPONSIBILITIES
        description: >
          The agreement must define tenant obligations including property
          upkeep, utility responsibilities, pet rules, vehicle rules,
          and notification duties for building problems. Explicit privacy
          rights language is preferred but obligations coverage is sufficient
          for this check to pass.

  landlord_rules:
    description: >
      Rules to ensure the landlord has fulfilled all legal and procedural
      obligations before the agreement is considered valid.
    checks:
      - name: TENANT CONSENT VERIFICATION
        description: >
          Confirm that the agreement contains a full disclosure and
          acknowledgement clause signed by or attributed to the tenant.
          A printed Full Disclosure clause (clause 14) with a signature
          line present constitutes consent verification even if the
          signature itself is a sample placeholder in a template document.

      - name: DATE COMPLETENESS CHECK
        description: >
          Verify that lease start date and lease end date are present
          and clearly stated within the body of the agreement.
          The acceptance date on the signature block is secondary;
          if start and end dates appear in the lease body, this check passes.

      - name: SIGNATURE COMPLETENESS CHECK
        description: >
          Verify that designated signature lines exist for both tenant
          and landlord in the agreement. For template or sample agreements,
          the presence of labelled signature lines (Tenant / Landlord-Manager)
          with associated Date fields is sufficient for this check to pass.

      - name: RED FLAG DETECTION
        description: >
          Scan the agreement for entries such as "TBD", "N/A" in critical
          clause fields, or contradictory terms. Blank signature lines on
          a sample/template document are expected and should not be flagged
          as red flags if the lease body clauses are fully populated.

      - name: LANDLORD OBLIGATIONS DISCLOSURE
        description: >
          Confirm the agreement specifies which utilities and services the
          landlord is responsible for. A clear utility responsibility split
          (e.g., landlord pays water, sewer, garbage) satisfies this check.
          Emergency contact details are preferred but not mandatory.

      - name: LEGAL COMPLIANCE CHECK
        description: >
          Verify that the agreement addresses security deposit handling,
          late payment penalties, returned payment charges, and property
          damage liability. Full statutory eviction procedure language is
          preferred but not required for this check to pass.

  insurer_rules:
    description: >
      Rules to ensure the rental agreement meets the minimum requirements
      for insurance validation and liability coverage.
    checks:
      - name: TENANT SIGNATURE VALIDATION
        description: >
          Confirm that a designated tenant signature line exists and is
          labelled with the tenant's name (Silvia Mando) or the label
          "Tenant" with an associated Date field. For sample agreements,
          a labelled signature block is sufficient validation.

      - name: LANDLORD SIGNATURE VALIDATION
        description: >
          Confirm that a designated landlord or landlord-manager signature
          line exists and is labelled accordingly with an associated Date
          field. For sample agreements, a labelled signature block is
          sufficient validation.

      - name: PROPERTY DETAILS VERIFICATION
        description: >
          Validate that the property address and unit number are clearly
          stated in the agreement body. The address 9876 Cherry Avenue,
          Apartment 426 must be present and unambiguous.

      - name: COVERAGE PERIOD ALIGNMENT
        description: >
          Ensure the rental term start and end dates are clearly stated
          in the agreement. July 1 2012 to June 30 2013 constitutes a
          valid and complete coverage period. Month-to-month continuation
          language is acceptable.

      - name: LIABILITY CLAUSE PRESENCE
        description: >
          Confirm the agreement contains language addressing financial
          consequences for property damage, including security deposit
          deductions for damages and cleaning. A formal renter's insurance
          mandate is preferred but the presence of damage liability and
          deposit deduction clauses is sufficient for this check to pass.